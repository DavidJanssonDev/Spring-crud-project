# ── Database connection ──────────────────────────────────────
# Make sure XAMPP MySQL is running before starting the app
spring.datasource.url=jdbc:mysql://localhost:3306/spring_crud_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
# update = creates tables if they don't exist, updates them if they change
spring.jpa.hibernate.ddl-auto=update

# Show the SQL queries Hibernate runs in the console (useful for debugging)
spring.jpa.show-sql=false

# Makes the SQL output readable/formatted in the console
spring.jpa.properties.hibernate.format_sql=false

spring.jpa.open-in-view=false

# ── Upload suff ───────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.upload.max-files=5
app.upload.dir=uploads
# ── JTW ───────────────────────────────────────────────────
jwt.secret=ShCeWHcPXolx5lxjQqFx6ZlCmJEmzAUtoRNR8UIvn2c
jwt.expiration=3600000

# ── Server ───────────────────────────────────────────────────
# Your app is already running on 9000 based on your logs, so keeping that
server.port=9000

spring.application.name=Spring-crud-project
